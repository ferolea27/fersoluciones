<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5A3A1A">
<title>Seguimiento de Obra — Fer Olea</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --madera:#5A3A1A;--madera-mid:#C8956C;--madera-light:#F5F0E8;--madera-dark:#3d2510;
  --verde:#2E6B1F;--verde-bg:#E8F5E2;--azul:#0C447C;--azul-bg:#E6F1FB;
  --amber:#854F0B;--amber-bg:#FAEEDA;--gris:#888780;--gris-bg:#F1EFE8;
  --rojo:#A32D2D;--rojo-bg:#FCEBEB;
  --bg:#F5F0E8;--card:#FFFFFF;--text:#2C2C2A;--text-soft:#5F5E5A;
  --border:#D3D1C7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* Header */
.header{background:var(--madera-dark);padding:22px 16px 20px}
.brand{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.brand-fer{font-family:'DM Serif Display',serif;font-size:28px;color:#f0e6d0}
.brand-olea{font-family:'DM Serif Display',serif;font-size:28px;color:var(--madera-mid)}
.brand-tag{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,149,108,.55);margin-bottom:16px}
.obra-nombre{font-size:22px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:4px}
.obra-meta{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.estado-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px}
.estado-pill-dot{width:7px;height:7px;border-radius:50%}

/* Progreso general */
.card{background:var(--card);margin:12px 14px;border-radius:14px;border:1px solid var(--border);overflow:hidden}
.card-title{padding:12px 14px 8px;font-size:10px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.09em}
.prog-section{background:var(--card);margin:12px 14px 0;border-radius:14px;border:1px solid var(--border);padding:14px}
.prog-titulo{font-size:10px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
.prog-bar-wrap{background:var(--bg);border-radius:6px;height:12px;overflow:hidden;margin-bottom:8px;border:1px solid var(--border)}
.prog-bar{height:100%;border-radius:6px;background:var(--madera-mid);transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-nums{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-pct{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text)}
.prog-sub{font-size:12px;color:var(--gris)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--bg);border-radius:10px;padding:8px 10px;text-align:center}
.stat-box-lbl{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.stat-box-val{font-size:18px;font-weight:700}
.stat-box-val.pend{color:var(--amber)}
.stat-box-val.curso{color:var(--verde)}
.stat-box-val.hecho{color:var(--gris)}

/* Sección económica */
.eco-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px 14px 14px}
.eco-cell{background:var(--bg);border-radius:10px;padding:10px 12px}
.eco-lbl{font-size:10px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.eco-val{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text)}

/* Ambientes */
.seccion-titulo{font-size:10px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.09em;padding:14px 14px 6px}
.ambiente-card{background:var(--card);margin:0 14px 10px;border-radius:14px;border:1px solid var(--border);overflow:hidden}
.ambiente-header{padding:13px 14px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ambiente-nombre{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.ambiente-stats{display:flex;gap:5px;flex-wrap:wrap}
.ast-hecho{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--gris-bg);color:var(--gris)}
.ast-curso{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--verde-bg);color:var(--verde)}
.ast-pend{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--amber-bg);color:var(--amber)}
.amb-prog-wrap{height:4px;background:var(--bg)}
.amb-prog-bar{height:100%;background:var(--madera-mid);transition:width .4s}
.ambiente-body{padding:10px 12px 12px;border-top:1px solid var(--border)}

/* Rubros */
.rubro-card{background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.rubro-card:last-of-type{margin-bottom:0}
.rubro-card.hecho{opacity:.85}
.rubro-header-pub{display:flex;align-items:center;gap:9px;padding:10px 12px;user-select:none}
.rubro-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rubro-nombre{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.rubro-tprog{font-size:10px;color:var(--gris);margin-top:1px}
.rubro-chip{font-size:10px;font-weight:700;padding:2px 9px;border-radius:6px;flex-shrink:0;white-space:nowrap}
.chip-pend{background:var(--amber-bg);color:var(--amber)}
.chip-curso{background:var(--verde-bg);color:var(--verde)}
.chip-hecho{background:var(--gris-bg);color:var(--gris)}
.rubro-toggle{color:var(--gris);font-size:11px;flex-shrink:0;transition:transform .2s;display:inline-block}
.rubro-card.rubro-collapsed .rubro-toggle{transform:rotate(-90deg)}
.tarea-bar{height:3px;background:var(--border);margin:0 12px 4px}
.tarea-bar-fill{height:100%;background:var(--verde);transition:width .4s}

/* Detalle del rubro */
.rubro-detail{border-top:1px solid var(--border);padding:10px 12px 12px}
.rubro-card.rubro-collapsed .rubro-detail{display:none}
.det-seccion{margin-bottom:10px}
.det-seccion:last-of-type{margin-bottom:0}
.det-lbl{font-size:9px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}

/* Tareas */
.tarea-pub-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.tarea-pub-row:last-of-type{border-bottom:none}
.tarea-pub-row.done{background:rgba(0,0,0,.01)}
.tarea-pub-icon{font-size:16px;flex-shrink:0;margin-top:1px;line-height:1}
.tarea-pub-txt{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.tarea-pub-row.done .tarea-pub-txt{color:var(--gris);text-decoration:line-through}
.tarea-pub-ok{font-size:10px;font-weight:700;color:var(--verde);flex-shrink:0;background:var(--verde-bg);padding:2px 7px;border-radius:6px}
.tarea-resumen{font-size:11px;font-weight:600;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}

/* Fotos */
.arch-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.arch-foto{width:80px;height:80px;border-radius:9px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--bg);flex-shrink:0}
.arch-foto img{width:100%;height:100%;object-fit:cover;display:block}
.arch-doc{display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid var(--border);border-radius:9px;cursor:pointer;background:#fff;font-size:11px;font-weight:600;color:var(--text)}
.arch-doc-icon{font-size:20px;flex-shrink:0}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Footer */
.footer{padding:28px 14px 20px;text-align:center}
.footer-brand{font-size:14px;font-weight:700;color:var(--madera)}
.footer-info{font-size:12px;color:var(--gris);margin-top:3px}
.footer-update{font-size:10px;color:var(--border);margin-top:6px}

/* Loading / error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--gris);gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--madera-mid);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:24px;text-align:center;color:var(--gris);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="brand"><span class="brand-fer">Fer </span><span class="brand-olea">Olea</span></div>
  <div class="brand-sub">Mantenimiento y Reformas · Tandil</div>
</div>

<div class="main">
  <div id="content"><div class="loading">Cargando obra...</div></div>

  <div class="card" style="margin-top:8px">
    <div class="card-title">Contacto</div>
    <div style="padding:10px 14px 14px;display:flex;flex-direction:column;gap:6px">
      <a class="contacto-btn wa-btn" href="https://wa.me/5492494066345" target="_blank">&#x1F4AC; WhatsApp</a>
      <a class="contacto-btn tel-btn" href="tel:+5492494066345">&#x260E; 2494 066 345</a>
    </div>
  </div>

  <div class="footer">Seguimiento generado por <a href="https://ferolea27.github.io/fersoluciones/" target="_blank">FerSoluciones</a></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">&#xd7;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const FB_CONFIG = {
  apiKey: "AIzaSyBKI33xasYOmjPnZau88f7jFIc4ylE0RWw",
  authDomain: "fersoluciones-56360.firebaseapp.com",
  databaseURL: "https://fersoluciones-56360-default-rtdb.firebaseio.com",
  projectId: "fersoluciones-56360",
};

const OBRA_EST = {
  'Presupuestado':{dot:'#854F0B',bg:'#FAEEDA'},
  'Confirmado'  :{dot:'#0C447C',bg:'#E6F1FB'},
  'En ejecucion':{dot:'#2E6B1F',bg:'#E8F5E2'},
  'Terminado'   :{dot:'#7B3FAD',bg:'#EDE0F5'},
  'Cobrado'     :{dot:'#888780',bg:'#F1EFE8'},
};

function pesos(n){ return '$'+Math.round(n||0).toLocaleString('es-AR'); }
function fmtFecha(v){ if(!v) return ''; const p=v.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }

// Leer ?obra=ID de la URL
const params = new URLSearchParams(location.search);
const obraId = params.get('obra');

if(!obraId) {
  document.getElementById('content').innerHTML = '<div class="error-box"><h2>Sin obra especificada</h2><p>El link no incluye el ID de la obra. Pedile a Fer el link correcto.</p></div>';
} else {
  try {
    firebase.initializeApp(FB_CONFIG);
    const db = firebase.database();
    db.ref('obras/'+obraId).on('value', snap => {
      const o = snap.val();
      if(!o) {
        document.getElementById('content').innerHTML = '<div class="error-box"><h2>Obra no encontrada</h2><p>El link puede estar desactualizado. Consultá a Fer.</p></div>';
        return;
      }
      renderObra(o);
    });
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error-box"><h2>Error de conexión</h2><p>'+e.message+'</p></div>';
  }
}

function renderObra(o) {
  const ambientes = Object.values(o.ambientes||{});
  const rubros = ambientes.flatMap(a => Object.values(a.rubros||{}));
  const total = rubros.length;
  const hechos = rubros.filter(r => r.estado==='Hecho').length;
  const enCurso = rubros.filter(r => r.estado==='En curso').length;
  const pct = total > 0 ? Math.round(hechos/total*100) : 0;

  const cobrado = Object.values(o.pagos||{}).reduce((a,p)=>a+(p.monto||0),0);
  const presup = o.presupuestoAprobado||0;
  const saldo = presup - cobrado;

  const est = OBRA_EST[o.estado] || {dot:'#888780', bg:'#F1EFE8'};

  let html = '';

  // Info principal
  html += '<div class="card">'
    + '<div class="obra-info">'
      + '<span class="obra-badge" style="background:'+est.bg+';color:'+est.dot+'">'
        + '<span style="width:8px;height:8px;border-radius:50%;background:'+est.dot+';flex-shrink:0;display:inline-block"></span>'
        + (o.estado||'Sin estado')
      + '</span>'
      + '<div class="obra-nombre" style="margin-top:8px">'+(o.nombre||'Obra')+'</div>'
      + (o.cliente ? '<div class="obra-meta"><strong>Cliente:</strong> '+o.cliente+'</div>' : '')
      + (o.dir ? '<div class="obra-meta"><strong>Dirección:</strong> '+o.dir+'</div>' : '')
      + (o.detalles ? '<div class="obra-meta" style="margin-top:6px;font-style:italic;color:var(--text-soft)">'+o.detalles+'</div>' : '')
      + (o.fechaInicio ? '<div class="obra-meta" style="margin-top:4px"><strong>Inicio:</strong> '+fmtFecha(o.fechaInicio)+(o.fechaFin?' · <strong>Est. fin:</strong> '+fmtFecha(o.fechaFin):'')+'</div>' : '')
    + '</div>'
    + (total > 0
      ? '<div style="padding:0 14px 14px">'
          + '<div class="progreso-wrap"><div class="progreso-bar" style="width:'+pct+'%"></div></div>'
          + '<div class="progreso-lbl">'+hechos+' de '+total+' rubros completados ('+pct+'%)'+(enCurso>0?' · '+enCurso+' en curso':'')+'</div>'
        + '</div>'
      : '')
  + '</div>';

  // Económico (solo si hay presupuesto)
  if(presup > 0) {
    html += '<div class="card"><div class="card-title">Resumen económico</div>'
      + '<div class="eco-grid">'
        + '<div class="eco-cell"><div class="eco-lbl">Presupuesto</div><div class="eco-val">'+pesos(presup)+'</div></div>'
        + '<div class="eco-cell"><div class="eco-lbl">Cobrado</div><div class="eco-val" style="color:var(--verde)">'+pesos(cobrado)+'</div></div>'
        + (saldo > 0 ? '<div class="eco-cell"><div class="eco-lbl">Saldo pendiente</div><div class="eco-val" style="color:var(--amber)">'+pesos(saldo)+'</div></div>' : '')
      + '</div>'
    + '</div>';
  }

  // Ambientes y rubros
  if(ambientes.length) {
    html += '<div class="seccion-titulo">Detalle por ambiente</div>';
    ambientes.forEach(function(amb) {
      var rubros = Object.values(amb.rubros||{});
      if(!rubros.length) return;

      // Stats del ambiente
      var rHechos=0, rCurso=0, rPend=0, tTotal=0, tDone=0;
      rubros.forEach(function(r){
        if(r.estado==='Hecho') rHechos++;
        else if(r.estado==='En curso') rCurso++;
        else rPend++;
        (r.tareas||[]).forEach(function(t){tTotal++;if(t.done)tDone++;});
      });
      var ambPct = rubros.length>0?Math.round(rHechos/rubros.length*100):0;
      var tarPct = tTotal>0?Math.round(tDone/tTotal*100):0;

      html += '<div class="ambiente-card">';
      html += '<div class="ambiente-header">';
      html += '<div class="ambiente-nombre">'+(amb.nombre||'Ambiente')+'</div>';
      html += '<div class="ambiente-stats">';
      if(rHechos>0) html += '<span class="ast-hecho">'+rHechos+' hecho'+(rHechos!==1?'s':'')+'</span>';
      if(rCurso>0)  html += '<span class="ast-curso">'+rCurso+' en curso</span>';
      if(rPend>0)   html += '<span class="ast-pend">'+rPend+' pendiente'+(rPend!==1?'s':'')+'</span>';
      html += '</div>';
      html += '</div>';

      // Barra de progreso del ambiente
      html += '<div class="amb-prog-wrap"><div class="amb-prog-bar" style="width:'+ambPct+'%"></div></div>';

      html += '<div class="ambiente-body">';
      rubros.forEach(function(rub) {
        var est    = rub.estado||'Pendiente';
        var tareas = rub.tareas||[];
        var fotos  = rub.fotos||[];
        var docs   = rub.docs||[];
        var tTot   = tareas.length;
        var tHech  = tareas.filter(function(t){return t.done;}).length;
        var tPct   = tTot>0?Math.round(tHech/tTot*100):0;
        var archN  = fotos.length+docs.length;

        var dotC   = {'Pendiente':'#854F0B','En curso':'#2E6B1F','Hecho':'#888780'}[est]||'#888780';
        var chipC  = {'Pendiente':'chip-pend','En curso':'chip-curso','Hecho':'chip-hecho'}[est]||'chip-pend';
        var esHecho= est==='Hecho';
        var rubId  = rub.id||('r'+Math.random().toString(36).slice(2,8));

        html += '<div class="rubro-card'+(esHecho?' hecho':'')+'" id="rc-'+rubId+'">';

        // Header del rubro
        html += '<div class="rubro-header-pub" onclick="toggleRubroViewer(\''+rubId+'\')" style="cursor:pointer">';
        html += '<div class="rubro-dot" style="background:'+dotC+'"></div>';
        html += '<div style="flex:1;min-width:0">';
        html += '<div class="rubro-nombre">'+(rub.nombre||'Trabajo')+'</div>';
        // Sub-línea de progreso de tareas
        if(tTot>0) html += '<div class="rubro-tprog">'+tHech+'/'+tTot+' tareas'+(esHecho?' · completado':'')+'</div>';
        html += '</div>';
        html += '<span class="rubro-chip '+chipC+'">'+est+'</span>';
        html += '<span class="rubro-toggle" id="rt-'+rubId+'">&#x25BC;</span>';
        html += '</div>';

        // Barra progreso tareas (si hay)
        if(tTot>0&&!esHecho) {
          html += '<div class="tarea-bar" style="margin:0 12px 0"><div class="tarea-bar-fill" style="width:'+tPct+'%"></div></div>';
        }

        // Detalle colapsable (expandido por defecto)
        html += '<div class="rubro-detail" id="rd-'+rubId+'">';

        // == TAREAS ==
        if(tTot>0) {
          html += '<div class="det-seccion">';
          html += '<div class="det-lbl">Trabajos a realizar</div>';
          tareas.forEach(function(t) {
            var txt  = typeof t==='string'?t:t.texto;
            var done = t.done||false;
            html += '<div class="tarea-pub-row '+(done?'done':'')+'">';
            html += '<span class="tarea-pub-icon">'+(done?'&#x2705;':'&#x25A1;')+'</span>';
            html += '<span class="tarea-pub-txt">'+txt+'</span>';
            if(done) html += '<span class="tarea-pub-ok">Listo</span>';
            html += '</div>';
          });
          if(tTot>0) {
            html += '<div class="tarea-resumen">'
              + (tHech===tTot
                  ? '<span style="color:var(--verde);font-weight:700">✓ Todo completado</span>'
                  : '<span style="color:var(--amber)">'+(tTot-tHech)+' tarea'+(tTot-tHech!==1?'s':'')+' pendiente'+(tTot-tHech!==1?'s':'')+'</span>')
            + '</div>';
          }
          html += '</div>';
        }

        // == FOTOS Y DOCS (sin precios, sin info interna) ==
        if(archN>0) {
          html += '<div class="det-seccion">';
          html += '<div class="det-lbl">Fotos del trabajo ('+archN+')</div>';
          html += '<div class="arch-grid">';
          fotos.forEach(function(f){
            var b64=f.b64||f;
            html += '<div class="arch-foto" onclick="abrirFoto(this)"><img src="'+b64+'" loading="lazy" style="display:none" onload="this.style.display=\'block\'"></div>';
          });
          docs.forEach(function(d){
            var iconDoc=d.mime==='application/pdf'?'&#x1F4C4;':d.mime&&d.mime.startsWith('image')?'&#x1F5BC;':'&#x1F4CE;';
            html += '<div class="arch-doc" onclick="abrirDoc(this)" data-b64="'+encodeURIComponent(d.b64||'')+'" data-mime="'+encodeURIComponent(d.mime||'')+'" data-nombre="'+encodeURIComponent(d.nombre||'archivo')+'">'
              +'<span class="arch-doc-icon">'+iconDoc+'</span>'
              +'<span>'+(d.nombre||'Archivo')+'</span>'
            +'</div>';
          });
          html += '</div></div>';
        }

        html += '</div>'; // rubro-detail
        html += '</div>'; // rubro-card
      });

      html += '</div></div>'; // ambiente-body, ambiente-card
    });
  } else {
    html += '<div class="card"><div class="empty">Todavía no hay ambientes registrados.</div></div>';
  }

  document.getElementById('content').innerHTML = html;
  document.title = (o.nombre||'Obra') + ' — Fer Olea';
}

window.toggleRubroViewer = function(rubId) {
  var card=document.getElementById('rc-'+rubId);
  var det=document.getElementById('rd-'+rubId);
  var tog=document.getElementById('rt-'+rubId);
  if(!card||!det) return;
  var collapsed=card.classList.toggle('rubro-collapsed');
  if(tog) tog.innerHTML=collapsed?'&#x25B6;':'&#x25BC;';
};
window.abrirFoto = function(el) {
  var img=typeof el==='string'?null:el.querySelector('img');
  var src=img?img.src:el;
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').classList.add('open');
};

window.abrirDoc = function(el) {
  try {
    var b64=decodeURIComponent(el.dataset.b64||'');
    var mime=decodeURIComponent(el.dataset.mime||'application/octet-stream');
    if(!b64) return;
    if(mime.startsWith('image/')){abrirFoto(b64);return;}
    var raw=b64.split(',')[1]||b64;
    var byteStr=atob(raw);var arr=new Uint8Array(byteStr.length);
    for(var i=0;i<byteStr.length;i++) arr[i]=byteStr.charCodeAt(i);
    var blob=new Blob([arr],{type:mime});
    var url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(function(){URL.revokeObjectURL(url);},8000);
  } catch(e){alert('No se pudo abrir el archivo');}
};
</script>
